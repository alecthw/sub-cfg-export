name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
          force_orphan: true

      - name: Configure gh-pages as Pages source
        uses: actions/github-script@v8
        with:
          script: |
            const source = { branch: 'gh-pages', path: '/' }
            try {
              await github.request('GET /repos/{owner}/{repo}/pages', context.repo)
              await github.request('PUT /repos/{owner}/{repo}/pages', {
                ...context.repo,
                source,
              })
            } catch (error) {
              if (error.status !== 404) throw error
              await github.request('POST /repos/{owner}/{repo}/pages', {
                ...context.repo,
                source,
              })
            }
